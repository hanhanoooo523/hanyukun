# GitHub Pages: symbio-shell-concept-standalone (site root) + root StyleShift-Presentation.html.
# Settings → Pages → Build and deployment → Source: GitHub Actions.
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "symbio-shell-concept-standalone/**"
      - "StyleShift-Presentation.html"
      - "设计风格迁移-改进版.html"
      - "Symbio-Shell-Biodesign-Planning.html"
      - "Symbio-Shell-项目规划.html"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site (concept bundle + StyleShift deck)
        run: |
          mkdir _site
          cp -r symbio-shell-concept-standalone/. _site/
          cp StyleShift-Presentation.html _site/
          cp "设计风格迁移-改进版.html" _site/
          cp Symbio-Shell-Biodesign-Planning.html _site/
          cp "Symbio-Shell-项目规划.html" _site/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
