# Deploy only symbio-shell-concept-standalone/ as GitHub Pages (concept page + assets).
# Settings → Pages → Build and deployment → Source: GitHub Actions.
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "symbio-shell-concept-standalone/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: symbio-shell-concept-standalone
      - id: deployment
        uses: actions/deploy-pages@v4
